version: "3.8"

services:
  # ===================
  # MinIO - S3-Compatible Storage
  # ===================
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"   # API
      - "127.0.0.1:9001:9001"   # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - /data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ===================
  # Redis - Job Queue + Chat Memory
  # ===================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - /data/redis:/data
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ===================
  # Docling - Document Parsing & OCR
  # ===================
  docling:
    image: ghcr.io/ds4sd/docling-serve:latest
    container_name: rag-docling
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - DOCLING_WORKERS=2
    volumes:
      - docling_cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G

  # ===================
  # LiteLLM - LLM API Proxy
  # ===================
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: rag-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://litellm:litellm_pass@172.18.0.1:5432/litellm
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ===================
  # Caddy - Reverse Proxy + HTTPS
  # ===================
  caddy:
    image: caddy:2-alpine
    container_name: rag-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # ===================
  # RAG SaaS API
  # ===================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===================
  # ARQ Background Worker
  # ===================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DOCLING_URL=http://docling:5001
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - redis
      - docling
      - minio
    command: ["python", "-m", "arq", "src.jobs.worker.WorkerSettings"]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('redis',6379),timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  docling_cache:
  caddy_data:
  caddy_config:
